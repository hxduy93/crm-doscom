name: Đọc lại dữ liệu (refresh data)

# Kéo dữ liệu mới nhất từ dashboard cũ -> cập nhật data/dashboard-data.json -> commit.
# KHÔNG còn cron, KHÔNG tự deploy: chỉ chạy khi bấm tay (tab Actions -> Run workflow).
# Sau khi commit + push, workflow "Deploy lên Cloudflare Pages" sẽ TỰ chạy theo push.
on:
  workflow_dispatch:        # chỉ bấm tay

permissions:
  contents: write           # cho phép commit data mới

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Đọc lại dữ liệu (refresh_data.py)
        run: python scripts/refresh_data.py

      # Noma911: giờ đọc LIVE từ D1 riêng của CRM qua /api/noma911/stats — không cần fetch ở đây nữa.

      - name: Commit nếu dữ liệu đổi (push sẽ kích hoạt deploy.yml)
        run: |
          git config user.name "crm-refresh-bot"
          git config user.email "kinhdoanh.doscom@gmail.com"
          git add data/dashboard-data.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu."
          else
            git commit -m "refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
