name: Đọc lại dữ liệu (refresh data)

# Kéo dữ liệu mới nhất từ dashboard cũ -> cập nhật data/dashboard-data.json -> commit -> deploy.
# Tự chạy 3 lần/ngày (9h / 13h / 17h giờ VN) + bấm tay khi cần (tab Actions -> Run workflow).
# Tự deploy luôn ở cuối workflow khi dữ liệu đổi (vì push bằng GITHUB_TOKEN không kích hoạt deploy.yml).
on:
  schedule:
    # Giờ cron của GitHub Actions là UTC. VN = UTC+7.
    # 9h VN = 02:00 UTC | 13h VN = 06:00 UTC | 17h VN = 10:00 UTC
    - cron: '0 2,6,10 * * *'
  workflow_dispatch:        # cho phép bấm tay khi cần

permissions:
  contents: write           # cho phép commit data mới

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Đọc lại dữ liệu (refresh_data.py)
        run: python scripts/refresh_data.py

      # Noma911: giờ đọc LIVE từ D1 riêng của CRM qua /api/noma911/stats — không cần fetch ở đây nữa.

      - name: Commit nếu dữ liệu đổi
        id: commit
        run: |
          git config user.name "crm-refresh-bot"
          git config user.email "kinhdoanh.doscom@gmail.com"
          git add data/dashboard-data.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Bot đẩy bằng GITHUB_TOKEN nên push KHÔNG kích hoạt deploy.yml (chống lặp vô hạn).
      # => Tự deploy ngay tại đây khi có dữ liệu mới, để web Cloudflare luôn cập nhật.
      # Deploy khi dữ liệu đổi HOẶC khi bấm tay (workflow_dispatch) — để thay đổi code (index.html) cũng lên được web.
      # refresh_data.py luôn chạy trước nên data trong dist luôn tươi, không dính lỗi "deploy data cũ".
      - name: Chuẩn bị thư mục deploy (khi dữ liệu đổi hoặc bấm tay)
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          rm -rf dist && mkdir dist
          cp index.html dist/
          cp -r data dist/data
          if [ -d demos ]; then cp -r demos dist/demos; fi
          for page in agent-geo-doscom.html ads-creator.html; do
            if [ -f "$page" ]; then cp "$page" dist/; fi
          done

      - name: Deploy lên Cloudflare Pages (khi dữ liệu đổi hoặc bấm tay)
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npx wrangler@4 pages deploy dist --project-name=crm-doscom --branch=master --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cffb0c35f8c649872436b2087a64b7bc
