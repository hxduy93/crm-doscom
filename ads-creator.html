// Giờ VN (UTC+7) theo định dạng input datetime-local: "YYYY-MM-DDTHH:MM".
// (Bị bỏ sót khi copy panel từ dashboard cũ → thiếu hàm này khiến trang trắng.)
function nowVnDatetime() {
  const d = new Date(Date.now() + 7 * 3600 * 1000); // dời sang giờ VN rồi đọc theo UTC
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())}T${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
}

    const file = e.target.files[0]
    if (file) {
      updateAd(id, { imageFile: file, videoFile: null, mediaPreview: URL.createObjectURL(file) })
    }
  }

  // ── Build url_tags string for Meta adcreative.url_tags field ──
  // Format: "utm_source=X&utm_medium=Y&..." — Meta sẽ tự append vào mọi link click
  // Đây là field "Thông số URL" trong Ads Manager UI. Link đích được giữ nguyên.
  const buildUtmString = (ad) => {
    const params = new URLSearchParams()
    if (ad.utmSource)   params.set("utm_source",   ad.utmSource)
    if (ad.utmMedium)   params.set("utm_medium",   ad.utmMedium)
    if (ad.utmCampaign) params.set("utm_campaign", ad.utmCampaign)
    if (ad.utmContent)  params.set("utm_content",  ad.utmContent)
    if (ad.utmTerm)     params.set("utm_term",     ad.utmTerm)
    return params.toString()
  }

  // ── AI generate content for a specific ad ──
  const handleGenerateContent = async (targetAdId) => {
    setAiTargetAdId(targetAdId)
    setAiLoading(true)
    setAiError("")
    setAiVariants([])
    setAiSelectedId(null)
    try {
      const notes = [
        aiKeyword ? `Từ khóa chính phải có: ${aiKeyword}` : "",
        aiDirection ? `Hướng content: ${aiDirection}` : "",
      ].filter(Boolean).join(" | ")

      const res = await fetch("/api/generate-ad-copy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          product,
          format: objective,
          formatLabel: (OBJECTIVES[objective] || {}).label || objective,
          cta: (ads.find(a => a.id === targetAdId) || {}).cta || "LEARN_MORE",
          notes,
          promotion: aiPromotion.trim(),
        }),
      })
      const data = await res.json()
      if (!res.ok || !data.variants) {
        throw new Error(data.error || "Lỗi không xác định")
      }
      setAiVariants(data.variants)
    } catch (err) {
      setAiError(err.message)
    } finally {
      setAiLoading(false)
    }
  }

  const handleUseVariant = (v) => {
    if (!aiTargetAdId) return
    updateAd(aiTargetAdId, { headline: v.headline || "", adCopy: v.primary_text || "" })
    setAiSelectedId(v.id)
  }

  // ── Build publish summary ──
  const buildSummary = () => {
    const today = new Date().toISOString().slice(0, 10)
    const objCfg = OBJECTIVES[objective]
    const finalCampaignName = campaignName || `${product} - ${objCfg.label} - ${today}`
    const finalAdsetName = adsetName || `${product} - AdSet - ${today}`

    return {
      campaign_name: finalCampaignName,
      adset_name: finalAdsetName,
      objective,
      objective_label: objCfg.label,
      buying_type: buyingType,
      account_id: account,
      account_name: ACCOUNTS[account] || account,
      page_id: page,
      page_name: (PAGES[page] || page),
      pixel_id: pixel,
      pixel_name: PIXELS[pixel] || pixel,
      optimization_goal: optGoal,
      optimization_goal_label: GOAL_LABELS[optGoal] || optGoal,
      destination_type: destType,
      billing_event: billingEvent,
      // Conversion event (chỉ apply khi optimization_goal = OFFSITE_CONVERSIONS)
      promoted_event: conversionEvent === "OTHER" ? (customEventName.trim() || null) : conversionEvent,
      promoted_event_label: conversionEvent === "OTHER"
        ? (customEventName || "(custom)")
        : ((PIXEL_EVENTS.find(e => e.value === conversionEvent) || {}).label || conversionEvent),
      // Attribution window spec
      attribution_spec: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).spec || null,
      attribution_label: (ATTRIBUTION_PRESETS.find(p => p.value === attributionPreset) || {}).label || "",
      // Pacing
      pacing_type: pacingType,
      launch_status: launchStatus, // "ACTIVE" | "PAUSED"
      budget_level: budgetLevel, // "campaign" (CBO) | "adset" (ABO)
      budget_type: budgetType,
      budget_amount: Number(budget),
      budget_display: `${Number(budget).toLocaleString("vi-VN")}đ ${budgetType === "daily" ? "/ngày" : "trọn đời"} (${budgetLevel === "campaign" ? "CBO" : "ABO"})`,
      start_time: startDate,
      end_time: endDate,
      // Targeting (Đối tượng) — gender, age, geo
      targeting: {
        geo_locations: { countries: countries.length ? countries : ["VN"] },
        age_min: Number(ageMin) || 18,
        age_max: Number(ageMax) || 65,
        ...(gender === "male" ? { genders: [1] } : gender === "female" ? { genders: [2] } : {}),
      },
      gender,
      gender_label: gender === "all" ? "Tất cả" : gender === "male" ? "Nam" : "Nữ",
      age_min: Number(ageMin) || 18,
      age_max: Number(ageMax) || 65,
      countries: countries.length ? countries : ["VN"],
      ads: ads.map((a, idx) => ({
        ad_name: a.adName || `${finalCampaignName} - Ad ${idx + 1}`,
        headline: a.headline,
        ad_copy: a.adCopy,
        cta: a.cta,
        // Link đích — GIỮ NGUYÊN, không append UTM
        link: a.link,
        // UTM đi vào field "Thông số URL" của Meta (adcreative.url_tags)
        url_tags: buildUtmString(a),
        utm: {
          source:   a.utmSource,
          medium:   a.utmMedium,
          campaign: a.utmCampaign,
          content:  a.utmContent,
          term:     a.utmTerm,
        },
        video_filename: a.videoFile?.name || null,
        image_filename: a.imageFile?.name || null,
      })),
      created_at: new Date().toISOString(),
    }
  }

  const handlePublish = () => {
    setStatus("ready")
    setStatusMsg(JSON.stringify(buildSummary(), null, 2))
  }

  const handleConfirm = async () => {
    setStatus("sending")
    const config = buildSummary()

    // Backup config to localStorage (safety net if endpoint fails)
    try {
      const pending = JSON.parse(localStorage.getItem("doscom_pending_ads") || "[]")
      pending.push(config)
      localStorage.setItem("doscom_pending_ads", JSON.stringify(pending))
    } catch(e) {}

    // ─── Step 1: Upload từng media qua /api/fb-upload-media ───
    // Tách step này ra để mỗi upload có 30s timeout riêng — không bị
    // Cloudflare cắt ở giữa lúc đợi FB xử lý video.
    try {
      for (let i = 0; i < ads.length; i++) {
        const a = ads[i]
        if (!a.videoFile && !a.imageFile) {
          throw new Error(`Ad #${i + 1} thiếu video hoặc ảnh`)
        }
        const file = a.videoFile || a.imageFile
        const kind = a.videoFile ? "video" : "image"
        setStatusMsg(`Đang upload ${kind} của Ad #${i + 1}/${ads.length}... ${kind === 'video' ? '(video cần ~10-25s để FB xử lý)' : ''}`)

        const fd = new FormData()
        fd.append("file", file, file.name)
        fd.append("account_id", config.account_id)
        fd.append("kind", kind)

        const res = await fetch("/api/fb-upload-media", { method: "POST", body: fd })
        const data = await res.json()
        if (!res.ok || !data.ok) {
          throw new Error(`[upload Ad #${i + 1} - ${data.step || '?'}] ${data.error || res.status}`)
        }
        // Inject media IDs vào config.ads[i]
        if (data.kind === "video") {
          config.ads[i].video_id = data.video_id
          config.ads[i].thumbnail_url = data.thumbnail_url
        } else {
          config.ads[i].image_hash = data.image_hash
        }
      }
    } catch (e) {
      setStatus("error")
      setStatusMsg(`Lỗi upload media: ${e.message}\n\nConfig đã backup vào localStorage. Đợi 30-60s rồi thử lại — video đã upload sẽ ready ở lần sau.`)
      return
    }

    // ─── Step 2: Tạo campaign + adset + ads với media IDs đã sẵn ───
    setStatusMsg("Đã upload xong media. Đang tạo campaign + adset + ads trên Meta Ads...")
    try {
      const fd2 = new FormData()
      fd2.append("config", JSON.stringify(config))
      // KHÔNG kèm file nữa — endpoint sẽ dùng video_id/image_hash trong config

      const res = await fetch("/api/create-campaign", { method: "POST", body: fd2 })
      const data = await res.json()
      if (!res.ok || !data.success) {
        const step = data.step || "unknown"
        const partialMsg = data.partial ? ` (đã tạo: ${JSON.stringify(data.partial)})` : ""
        throw new Error(`[${step}] ${data.error || "Lỗi không xác định"}${partialMsg}`)
      }
      setStatus("done")
      setStatusMsg(JSON.stringify({
        ok: true,
        campaign_id: data.campaign_id,
        adset_id: data.adset_id,
        ads_created: (data.ads || []).length,
        open_in_ads_manager: data.ads_manager_url,
      }, null, 2))
    } catch (e) {
      setStatus("error")
      setStatusMsg(`Lỗi: ${e.message}\n\nConfig đã backup vào localStorage — có thể paste vào chat Claude để tạo bằng tay.`)
    }
  }

  // ══════════ HANDLERS CHẾ ĐỘ TỰ ĐỘNG ══════════
  // Quét folder: gom video theo folder cha trực tiếp = 1 sản phẩm = 1 campaign.
  const handleAutoFolderSelect = (e) => {
    const files = Array.from(e.target.files || [])
    const vids = files.filter(f =>
      /\.(mp4|mov|m4v|avi|mkv|webm)$/i.test(f.name) || (f.type || "").startsWith("video")
    )
    const byFolder = {}
    for (const f of vids) {
      const rel = f.webkitRelativePath || f.name
      const parts = rel.split("/")
      const folder = parts.length > 1 ? parts[parts.length - 2] : "(gốc)"
      ;(byFolder[folder] = byFolder[folder] || []).push(f)
    }
    setAutoGroups(Object.entries(byFolder).map(([product, fs]) => ({ product, files: fs })))
    setAutoResults([])
    setAutoLog([])
  }

  const autoTotalVideos = autoGroups.reduce((n, g) => n + g.files.length, 0)
  const pushLog = (line) => setAutoLog(curr => [...curr, line])

  const handleAutoRun = async () => {
    if (autoBusy || autoGroups.length === 0) return
    setAutoBusy(true); setAutoResults([]); setAutoLog([])
    const today = new Date().toISOString().slice(0, 10)
    const results = []
    try {
      for (const g of autoGroups) {
        pushLog(`▶ Sản phẩm "${g.product}" — ${g.files.length} video`)
        const adsArr = []
        try {
          for (let i = 0; i < g.files.length; i++) {
            const file = g.files[i]
            const baseName = file.name.replace(/\.[^.]+$/, "")
            // 1) AI viết caption
            pushLog(`  • [${file.name}] AI viết caption...`)
            let headline = g.product, adCopy = baseName
            try {
              const r = await fetch("/api/generate-ad-copy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  product: autoCopyProduct,
                  format: "OUTCOME_SALES",
                  formatLabel: "Doanh số",
                  cta: autoCta,
                  notes: `Tên video: ${baseName} | Nhóm sản phẩm: ${g.product}`,
                  promotion: "",
                }),
              })
              const d = await r.json()
              if (r.ok && d.variants && d.variants[0]) {
                headline = d.variants[0].headline || g.product
                adCopy = d.variants[0].primary_text || baseName
              } else {
                pushLog(`    ⚠ caption lỗi (${d.error || r.status}) → tạm dùng tên file`)
              }
            } catch (err) {
              pushLog(`    ⚠ caption lỗi: ${err.message} → tạm dùng tên file`)
            }
            // 2) Upload video lên FB
            pushLog(`  • [${file.name}] upload lên FB (đợi xử lý)...`)
            const fd = new FormData()
            fd.append("file", file, file.name)
            fd.append("account_id", autoAccount)
            fd.append("kind", "video")
            const ur = await fetch("/api/fb-upload-media", { method: "POST", body: fd })
            const ud = await ur.json()
            if (!ur.ok || !ud.ok) throw new Error(`upload "${file.name}" [${ud.step || "?"}]: ${ud.error || ur.status}`)
            adsArr.push({
              ad_name: `${g.product} - ${baseName}`,
              headline, ad_copy: adCopy, cta: autoCta, link: autoLink,
              url_tags: "", video_id: ud.video_id, thumbnail_url: ud.thumbnail_url,
            })
            pushLog(`    ✓ video ${i + 1}/${g.files.length} xong`)
          }
          // 3) Tạo campaign cho cả nhóm (1 campaign → 1 adset → nhiều ad)
          pushLog(`  • Tạo campaign "${g.product}" với ${adsArr.length} quảng cáo...`)
          const config = {
            campaign_name: `${g.product} - Doanh số - ${today}`,
            adset_name: `${g.product} - AdSet - ${today}`,
            objective: "OUTCOME_SALES",
            buying_type: "AUCTION",
            account_id: autoAccount,
            page_id: autoPage,
            pixel_id: autoPixel,
            optimization_goal: "OFFSITE_CONVERSIONS",
            destination_type: "WEBSITE",
            billing_event: "IMPRESSIONS",
            promoted_event: "COMPLETE_REGISTRATION",
            pacing_type: "standard",
            launch_status: "PAUSED",
            budget_level: "adset",
            budget_type: "daily",
            budget_amount: Number(autoBudget),
            targeting: {
              geo_locations: { countries: ["VN"] },
              age_min: Number(autoAgeMin) || 18,
              age_max: Number(autoAgeMax) || 65,
            },
            ads: adsArr,
          }
          const fd2 = new FormData()
          fd2.append("config", JSON.stringify(config))
          const cr = await fetch("/api/create-campaign", { method: "POST", body: fd2 })
          const cd = await cr.json()
          if (!cr.ok || !cd.success) throw new Error(`[${cd.step || "?"}] ${cd.error || "lỗi tạo camp"}`)
          pushLog(`  ✓ Xong campaign "${g.product}" (PAUSED)`)
          results.push({ product: g.product, ok: true, campaign_id: cd.campaign_id, ads_created: (cd.ads || []).length, ads_manager_url: cd.ads_manager_url })
        } catch (err) {
          pushLog(`  ✗ "${g.product}" lỗi: ${err.message}`)
          results.push({ product: g.product, ok: false, error: err.message })
        }
        setAutoResults([...results])
      }
      pushLog(`■ Hoàn tất: ${results.filter(r => r.ok).length}/${results.length} campaign tạo thành công.`)
    } finally {
      setAutoBusy(false)
    }
  }

  // Initialize defaults
  React.useEffect(() => { handleProductChange("D1") }, [])

  // ── Validations ──
  const allAdsHaveContent = ads.every(a => a.headline && a.adCopy)
  const canPublish = allAdsHaveContent

  const selectClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
  const inputClass = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
  const labelClass = "block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5"
  const sectionHeaderClass = "flex items-center gap-3 mb-5 pb-3 border-b-2"

  // ── Render ──
  return (
    <div className="space-y-6">
      {/* HEADER */}
      <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-6 text-white">
        <h2 className="text-xl font-bold flex items-center gap-2"><Megaphone /> Tạo Quảng Cáo Facebook</h2>
        <p className="text-blue-100 text-sm mt-1">Cấu hình theo đúng cấu trúc: Chiến dịch → Nhóm quảng cáo → Quảng cáo</p>
      </div>

      {/* ═══════════════ CHỌN CHẾ ĐỘ ═══════════════ */}
      <div className="flex gap-2">
        <button onClick={() => setMode("auto")} className={"px-4 py-2.5 rounded-lg text-sm font-bold transition " + (mode === "auto" ? "bg-indigo-600 text-white shadow" : "bg-white text-gray-600 border border-gray-300 hover:bg-gray-50")}>⚡ Tự động từ folder</button>
        <button onClick={() => setMode("manual")} className={"px-4 py-2.5 rounded-lg text-sm font-bold transition " + (mode === "manual" ? "bg-indigo-600 text-white shadow" : "bg-white text-gray-600 border border-gray-300 hover:bg-gray-50")}>✍️ Thủ công (từng quảng cáo)</button>
      </div>

      {/* ═══════════════ CHẾ ĐỘ TỰ ĐỘNG ═══════════════ */}
      {mode === "auto" && (
        <div className="space-y-5">
          {/* Template Noma */}
          <div className="bg-white rounded-xl border-2 border-indigo-200 p-5 shadow-sm">
            <div className="flex items-center gap-3 mb-4 pb-3 border-b-2 border-indigo-500">
              <div className="w-10 h-10 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold text-lg">⚡</div>
              <div>
                <h3 className="text-base font-bold text-indigo-900">Tự động từ folder video</h3>
                <p className="text-xs text-gray-500 mt-0.5">Chọn folder sản phẩm → mỗi video thành 1 quảng cáo, gom vào 1 chiến dịch. AI tự viết caption.</p>
              </div>
            </div>
            <div className="flex flex-wrap gap-2 mb-4">
              <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-200">Mục tiêu: Doanh số (Sales)</span>
              <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-purple-50 text-purple-700 border border-purple-200">Sự kiện: Hoàn tất đăng ký</span>
              <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-700 border border-amber-200">Tạo ở PAUSED (duyệt rồi bật)</span>
              <span className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-gray-50 text-gray-600 border border-gray-200">VN · 1 folder = 1 campaign</span>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label className={labelClass}>Tài khoản QC</label>
                <input className={inputClass} value={autoAccount} onChange={e => setAutoAccount(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>Page ID</label>
                <input className={inputClass} value={autoPage} onChange={e => setAutoPage(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>Pixel ID</label>
                <input className={inputClass} value={autoPixel} onChange={e => setAutoPixel(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>SP danh mục (để AI viết caption)</label>
                <select className={selectClass} value={autoCopyProduct} onChange={e => setAutoCopyProduct(e.target.value)}>
                  {Object.keys(PRODUCTS).map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div className="md:col-span-2">
                <label className={labelClass}>Link đích</label>
                <input className={inputClass} value={autoLink} onChange={e => setAutoLink(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>Ngân sách/ngày (VND)</label>
                <input className={inputClass} type="number" value={autoBudget} onChange={e => setAutoBudget(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>Nút CTA</label>
                <select className={selectClass} value={autoCta} onChange={e => setAutoCta(e.target.value)}>
                  <option value="ORDER_NOW">Đặt hàng</option>
                  <option value="SHOP_NOW">Mua ngay</option>
                  <option value="LEARN_MORE">Tìm hiểu thêm</option>
                  <option value="SIGN_UP">Đăng ký</option>
                </select>
              </div>
              <div>
                <label className={labelClass}>Tuổi từ</label>
                <input className={inputClass} type="number" value={autoAgeMin} onChange={e => setAutoAgeMin(e.target.value)} />
              </div>
              <div>
                <label className={labelClass}>Tuổi đến</label>
                <input className={inputClass} type="number" value={autoAgeMax} onChange={e => setAutoAgeMax(e.target.value)} />
              </div>
            </div>
          </div>

          {/* Chọn folder + chạy */}
          <div className="bg-white rounded-xl border-2 border-gray-200 p-5 shadow-sm">
            <label className={labelClass}>Chọn folder sản phẩm (chứa video)</label>
            <input type="file" multiple webkitdirectory="" directory="" onChange={handleAutoFolderSelect}
              className="block w-full text-sm text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-semibold hover:file:bg-indigo-100" />
            <p className="text-xs text-gray-400 mt-1.5">Mẹo: chọn folder cha chứa nhiều folder con (mỗi con = 1 sản phẩm) để tạo nhiều campaign cùng lúc. Video nên &lt; ~30MB (giới hạn upload qua cloud).</p>

            {autoGroups.length > 0 && (
              <div className="mt-4 space-y-2">
                <p className="text-xs font-semibold text-gray-600">Tìm thấy {autoTotalVideos} video trong {autoGroups.length} sản phẩm:</p>
                {autoGroups.map(g => (
                  <div key={g.product} className="border border-gray-200 rounded-lg p-3">
                    <p className="text-sm font-bold text-gray-800">📁 {g.product} <span className="font-normal text-gray-400">— {g.files.length} video → 1 campaign</span></p>
                    <p className="text-[11px] text-gray-500 mt-1 truncate">{g.files.map(f => f.name).join(", ")}</p>
                  </div>
                ))}
              </div>
            )}

            <button onClick={handleAutoRun} disabled={autoBusy || autoGroups.length === 0}
              className={"mt-4 w-full py-3 rounded-lg text-sm font-bold text-white " + (autoBusy || autoGroups.length === 0 ? "bg-gray-300 cursor-not-allowed" : "bg-indigo-600 hover:bg-indigo-700")}>
              {autoBusy ? "Đang chạy, đừng đóng tab..." : `⚡ Tạo ${autoGroups.length || ""} campaign tự động (${autoTotalVideos} video)`}
            </button>
          </div>

          {/* Tiến trình + kết quả */}
          {(autoLog.length > 0 || autoResults.length > 0) && (
            <div className="bg-gray-900 rounded-xl p-4 shadow-sm">
              <p className="text-xs font-bold text-gray-300 uppercase mb-2">Tiến trình</p>
              <pre className="text-[11px] whitespace-pre-wrap text-green-300 max-h-72 overflow-auto" style={{fontFamily:"ui-monospace,monospace"}}>{autoLog.join("\n")}</pre>
              {autoResults.length > 0 && (
                <div className="mt-3 space-y-2">
                  {autoResults.map((r, i) => (
                    <div key={i} className={"rounded-lg p-2.5 text-xs " + (r.ok ? "bg-green-50 border border-green-200" : "bg-red-50 border border-red-200")}>
                      {r.ok ? (
                        <div className="flex items-center justify-between gap-2">
                          <span className="text-green-800 font-semibold">✓ {r.product} — {r.ads_created} quảng cáo (PAUSED)</span>

              <p><span className="font-bold text-gray-700">3.</span> Ấn "Tạo chiến dịch" → Xác nhận & Gửi</p>
              <p><span className="font-bold text-gray-700">4.</span> Hệ thống tự upload media + tạo Campaign/AdSet/Ad (PAUSED) qua Meta API</p>
              <p><span className="font-bold text-gray-700">5.</span> Review trên Ads Manager → Bật ACTIVE</p>
            </div>

        </div>

      </div>
      )}

}
