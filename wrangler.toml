name = "crm-doscom"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

# D1 riêng của CRM (đơn đăng ký Noma911). Binding tên DB để khớp functions/.
[[d1_databases]]
binding = "DB"
database_name = "crm-doscom-db"
database_id = "73cfb6ca-b9b4-4a9b-b74f-1a030f8db1d0"

# KV cho Agent FB Ads: cache kết quả audit + bộ nhớ lịch sử campaign + fb_config.
# Dùng LẠI namespace DOSCOM_INVENTORY của dashboard cũ (cùng tài khoản CF).
[[kv_namespaces]]
binding = "INVENTORY"
id = "3efb5b02ea844d67ade8d070547ae707"

# Workers AI — fallback Llama khi Claude lỗi (qua AI Gateway 'doscom-erp').
[ai]
binding = "AI"

# Vars (plaintext). Secret set riêng qua: npx wrangler pages secret put <NAME> --project-name crm-doscom
#   - ANTHROPIC_API_KEY  (Claude)
#   - FB_ACCESS_TOKEN    (Meta token có quyền trên TK 927390616363424 — cho /api/optimizer/* + tạo camp)
#   - OPTIMIZER_TOKEN    (mật khẩu để LƯU danh sách bảo vệ / shadow / killswitch từ UI)
[vars]
CF_ACCOUNT_ID = "cffb0c35f8c649872436b2087a64b7bc"
# URL Worker agent tối ưu (để UI xem agent vừa làm gì).
OPTIMIZER_WORKER_URL = "https://fb-ads-auto-agent.doscom-vietnam.workers.dev"
